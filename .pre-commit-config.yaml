repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --config, backend/ruff.toml]
        files: ^backend/
      - id: ruff-format
        args: [--config, backend/ruff.toml]
        files: ^backend/

  - repo: local
    hooks:
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npx eslint --max-warnings 0 "$@"' --
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        types: [file]
