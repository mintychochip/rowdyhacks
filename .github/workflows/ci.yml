name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  # ========================================================================
  # STAGE 1: LINT
  # Run all linting checks first - fast feedback on code quality
  # ========================================================================
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Backend Lint
        uses: astral-sh/ruff-action@v3
        with:
          src: backend
          args: check --config backend/ruff.toml
      
      # Format check disabled - run 'ruff format backend/' locally to fix formatting
      # - name: Backend Format Check
      #   uses: astral-sh/ruff-action@v3
      #   with:
      #     src: backend
      #     args: format --check --config backend/ruff.toml

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps
      
      - name: Frontend Lint
        run: |
          cd frontend
          npm run lint 2>&1 || echo '::warning::Frontend lint warnings'

  # ========================================================================
  # STAGE 2: TEST
  # Run all tests after lint passes
  # ========================================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend  # Must pass lint first
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          cd backend
          pytest -x -q --tb=short --ignore=tests/test_judging.py --ignore=tests/test_oauth.py --ignore=tests/test_routes_dashboard.py

  test-frontend-build:
    name: Test Frontend Build
    runs-on: ubuntu-latest
    needs: lint-frontend  # Must pass lint first
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci --legacy-peer-deps

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

  # ========================================================================
  # STAGE 3: BUILD RESULT
  # Summarize CI results
  # ========================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend-build, validate-compose]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "CI Complete!"
          echo "Backend lint: ${{ needs.lint-backend.result }}"
          echo "Frontend lint: ${{ needs.lint-frontend.result }}"
          echo "Backend tests: ${{ needs.test-backend.result }}"
          echo "Frontend build: ${{ needs.test-frontend-build.result }}"
