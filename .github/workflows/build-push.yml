name: Build and Push Images

on:
  push:
    branches: [master]
  workflow_dispatch:  # Manual trigger

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/mintychochip/rowdyhacks/backend
  FRONTEND_IMAGE: ghcr.io/mintychochip/rowdyhacks/frontend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Required for GHCR push

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "Images built and pushed:"
          echo "  Backend: ${{ env.BACKEND_IMAGE }}:latest (${{ steps.sha.outputs.sha }})"
          echo "  Frontend: ${{ env.FRONTEND_IMAGE }}:latest (${{ steps.sha.outputs.sha }})"
