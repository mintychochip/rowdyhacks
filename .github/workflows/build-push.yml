name: Build and Push Images

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/mintychochip/rowdyhacks/backend
  FRONTEND_IMAGE: ghcr.io/mintychochip/rowdyhacks/frontend

jobs:
  # Stage 1: Build Backend Image
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Backend image digest
        run: echo "Backend: ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.sha }}"

  # Stage 2: Build Frontend Image (parallel with backend)
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Frontend image digest
        run: echo "Frontend: ${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.sha }}"

  # Stage 3: Summary (waits for both builds)
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Get short SHA
        id: sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Image Summary
        run: |
          echo "Images built and pushed successfully!"
          echo ""
          echo "Backend: ${{ env.BACKEND_IMAGE }}:latest"
          echo "         ${{ env.BACKEND_IMAGE }}:${{ steps.sha.outputs.sha }}"
          echo ""
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:latest"
          echo "          ${{ env.FRONTEND_IMAGE }}:${{ steps.sha.outputs.sha }}"
          echo ""
          echo "Watchtower will auto-deploy these images to the VPS within ~60 seconds."
