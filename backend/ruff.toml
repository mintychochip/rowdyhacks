target-version = "py311"
line-length = 120

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "E722",   # bare except (existing pattern throughout codebase)
    "E741",   # ambiguous variable name
    "B008",   # function calls in argument defaults (FastAPI Depends pattern)
    "UP006",  # use list/dict instead of List/Dict (temporarily disabled - widespread issues)
    "UP007",  # use X | Y for unions (keep Optional for readability)
    "UP035",  # use collections.abc instead of typing (temporarily disabled)
    "UP042",  # replace with PEP 695 type alias (keep backward compat)
    "UP045",  # use X | None for type annotations (temporarily disabled - widespread issues)
    "F821",   # undefined name (false positives on forward refs / deferred imports)
    "SIM102", # collapsible if (readability preference)
    "SIM105", # use contextlib.suppress (readability preference)
    "SIM108", # use ternary (readability preference)
    "E402",   # module-level import not at top (deferred imports for perf)
    "B904",   # raise without from in except (existing pattern)
    "B007",   # unused loop variable (use _ prefix convention)
    "B017",   # assert blind exception in tests (existing pattern)
    "F841",   # unused variable assignment (existing pattern)
    "SIM117", # nested with statements (readability preference)
    "F401",   # unused imports (temporarily disabled - widespread in assistant module)
    "I001",   # import sorting (temporarily disabled - needs systematic fix)
    "E712",   # comparison to True/False (temporarily disabled)
]

[lint.per-file-ignores]
"tests/*" = ["B", "SIM", "F841"]
"__init__.py" = ["F401"]  # re-exports

[format]
quote-style = "double"
